---
# =============================================================================
# Ingress — nginx ingress controller routes traffic from the AWS NLB
#
# Traffic flow:
#   Internet
#     └─► AWS NLB (provisioned automatically by ingress-nginx LoadBalancer svc)
#           └─► nginx Ingress Controller (ingress-nginx namespace)
#                 ├─► Host: stressforge.local
#                 │     ├─► /api  ──► api Service (ClusterIP :8000)
#                 │     └─► /     ──► frontend Service (ClusterIP :80)
#                 └─► Host: locust.local
#                       └─► /     ──► locust Service (ClusterIP :8089)
#
# Local access (add to /etc/hosts):
#   <NLB-IP>  stressforge.local
#   <NLB-IP>  locust.local
#
# Get NLB IP:
#   kubectl get svc ingress-nginx-controller -n ingress-nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stressforge-ingress
  namespace: stressforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # StressForge App — http://stressforge.local
    - host: stressforge.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    # Locust Load Testing Dashboard — http://locust.local
    - host: locust.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: locust
                port:
                  number: 8089
