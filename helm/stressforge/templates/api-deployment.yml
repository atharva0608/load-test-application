---
# API ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: stressforge
data:
  DATABASE_URL: "postgresql://stressforge:stressforge_pass@postgres:5432/stressforge_db"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  SEED_ON_STARTUP: "true"
  SEED_PRODUCTS: "1000"
---
# API Secret
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: stressforge
type: Opaque
stringData:
  JWT_SECRET_KEY: "stressforge-super-secret-key-change-in-production"
---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: stressforge
  labels:
    app: api
    tier: backend
spec:
  # replicas intentionally omitted — HPA owns the replica count.
  # Setting it here causes ArgoCD to fight HPA in a sync loop.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/stressforge-api:{{ .Values.image.tags.api }}"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
# API Service
# Exposed externally via: http://stressforge.local/api
# Traffic path: NLB → nginx Ingress Controller → this ClusterIP service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: stressforge
  labels:
    app: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: api
---
# API HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: stressforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
